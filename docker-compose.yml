version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15
    container_name: naac_postgres
    environment:
      POSTGRES_DB: naac_db
      POSTGRES_USER: naac_user
      POSTGRES_PASSWORD: naac_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - naac_network

  # Object Storage (S3 Compatible)
  minio:
    image: minio/minio:latest
    container_name: naac_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - naac_network

  # Search Engine
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: naac_meilisearch
    environment:
      MEILI_MASTER_KEY: meilisearch_master_key
      MEILI_NO_ANALYTICS: true
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - naac_network

  # Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: naac_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
    volumes:
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - naac_network

  # Analytics Dashboard
  metabase:
    image: metabase/metabase:latest
    container_name: naac_metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: metabase_user
      MB_DB_PASS: metabase_password
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    ports:
      - "3001:3000"
    depends_on:
      - postgres
    networks:
      - naac_network

  # Backend Django Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: naac_backend
    environment:
      DEBUG: 1
      DATABASE_URL: postgresql://naac_user:naac_password@postgres:5432/naac_db
      KEYCLOAK_URL: http://keycloak:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: meilisearch_master_key
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
      - meilisearch
      - keycloak
    networks:
      - naac_network
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: naac_frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_KEYCLOAK_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - naac_network
    command: npm run dev -- --host 0.0.0.0

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: naac_nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/var/www/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - naac_network

volumes:
  postgres_data:
  minio_data:
  meilisearch_data:
  keycloak_data:
  metabase_data:
  media_files:
  static_files:

networks:
  naac_network:
    driver: bridge